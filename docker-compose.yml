x-aichestra-app: &aichestra-app
  build:
    context: .
  image: aichestra:local

services:
  api:
    <<: *aichestra-app
    command: ["pnpm", "--filter", "@aichestra/api", "dev"]
    environment:
      AICHESTRA_API_HOST: 0.0.0.0
      AICHESTRA_API_PORT: "3000"
      AICHESTRA_STORAGE_PROVIDER: in-memory
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    <<: *aichestra-app
    command: ["pnpm", "--filter", "@aichestra/web", "dev"]
    environment:
      AICHESTRA_WEB_HOST: 0.0.0.0
      AICHESTRA_WEB_PORT: "3001"
      AICHESTRA_DASHBOARD_DATA_SOURCE: api
      AICHESTRA_DASHBOARD_API_BASE_URL: http://api:3000
      AICHESTRA_DASHBOARD_DISABLE_DEMO_FALLBACK: "true"
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  postgres:
    image: postgres:16
    profiles:
      - postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aichestra
      POSTGRES_USER: aichestra
      POSTGRES_PASSWORD: aichestra
    volumes:
      - aichestra_postgres:/var/lib/postgresql/data

volumes:
  aichestra_postgres:
